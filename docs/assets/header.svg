<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <!-- Background -->
  <rect width="1280" height="320" rx="0" fill="#0f172a"/>

  <!-- Subtle grid -->
  <g stroke="#1e293b" stroke-width="1" fill="none">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
  </g>

  <!-- Left accent bar -->
  <rect x="60" y="80" width="4" height="160" rx="2" fill="#f43f5e"/>

  <!-- Decorative code brackets left -->
  <text x="80" y="112" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" fill="#475569">{</text>
  <text x="80" y="132" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" fill="#f43f5e" fill-opacity="0.5">  .unused</text>
  <text x="80" y="152" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" fill="#475569">}</text>

  <!-- Decorative code brackets right -->
  <text x="1100" y="192" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" fill="#475569">{</text>
  <text x="1100" y="212" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" fill="#f43f5e" fill-opacity="0.5">  #nav</text>
  <text x="1100" y="232" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" fill="#475569">}</text>

  <!-- Color dots left -->
  <circle cx="100" cy="250" r="10" fill="#f43f5e"/>
  <circle cx="126" cy="250" r="10" fill="#3b82f6"/>
  <circle cx="152" cy="250" r="10" fill="#22c55e"/>
  <circle cx="178" cy="250" r="10" fill="#eab308"/>

  <!-- Terminal prompt top-right -->
  <rect x="920" y="60" width="220" height="28" rx="6" fill="#1e293b"/>
  <text x="936" y="79" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="12" fill="#22c55e">$ cssgrep unused</text>

  <!-- Terminal prompt bottom-right -->
  <rect x="920" y="240" width="220" height="28" rx="6" fill="#1e293b"/>
  <text x="936" y="259" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="12" fill="#eab308">$ cssgrep colors</text>

  <!-- Title -->
  <text x="640" y="148" font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="#f8fafc" letter-spacing="-2">
    cssgrep
  </text>

  <!-- Subtitle -->
  <text x="640" y="195" font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="#94a3b8" letter-spacing="4">
    CSS-AWARE SEARCH &amp; AUDIT TOOL
  </text>

  <!-- Tagline -->
  <text x="640" y="232" font-family="ui-monospace,SFMono-Regular,Monaco,Consolas,monospace" font-size="13" text-anchor="middle" fill="#f43f5e" fill-opacity="0.7">
    unused selectors  ·  color extraction  ·  specificity audit
  </text>

  <!-- Bottom accent line -->
  <line x1="490" y1="268" x2="790" y2="268" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
</svg>
